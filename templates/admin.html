<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa em Prol da Cirurgia do Pingo - Administração</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">🎰 RIFA 100 - Administração</h1>
            <ul class="nav-links">
                <li><a href="/">Início</a></li>
                <li><a href="/admin/logout" style="color: #e74c3c;">Sair</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <section class="admin-section">
            <h1>Painel de Administração</h1>

            <div class="admin-tabs">
                <button class="tab-btn active" data-status="pendente">Pendentes</button>
                <button class="tab-btn" data-status="aprovado">Aprovados</button>
                <button class="tab-btn" data-status="rejeitado">Rejeitados</button>
            </div>

            <div class="admin-table">
                <table id="participantesTable">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Email</th>
                            <th>Tipo</th>
                            <th>Tickets</th>
                            <th>Data</th>
                            <th>Comprovantes</th>
                            <th>Números</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="8" style="text-align: center;">Carregando...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Modal de Rejeição -->
    <div id="rejeicaoModal" class="modal">
        <div class="modal-content">
            <span class="close" data-close-modal="rejeicaoModal">&times;</span>
            <h2>Rejeitar Participante</h2>
            <input type="hidden" id="participanteIdRejeitar">
            <div class="form-group">
                <label for="motivo">Motivo da Rejeição:</label>
                <textarea id="motivo" placeholder="Digite o motivo..." required></textarea>
            </div>
            <button class="btn btn-danger" onclick="confirmarRejeicao()">Confirmar Rejeição</button>
        </div>
    </div>

    <div id="edicaoModal" class="modal">
        <div class="modal-content">
            <span class="close" data-close-modal="edicaoModal">&times;</span>
            <h2>Editar Participante</h2>
            <input type="hidden" id="participanteIdEditar">
            <input type="hidden" id="tipoSolicitacaoEditar">
            <input type="hidden" id="podeEditarQuantidade">

            <div class="form-group">
                <label for="nomeEditar">Nome:</label>
                <input type="text" id="nomeEditar" placeholder="Nome do participante" required>
            </div>

            <div class="form-group" id="grupoQuantidadeEditar">
                <label for="quantidadeEditar">Quantidade de Tickets:</label>
                <input type="number" id="quantidadeEditar" min="1" max="200">
                <small id="quantidadeHint" class="form-hint">Ajuste antes de aprovar a solicitação.</small>
            </div>

            <div class="modal-actions">
                <button class="btn btn-secondary" type="button" onclick="fecharModal('edicaoModal')">Cancelar</button>
                <button class="btn btn-primary" type="button" onclick="salvarEdicao()">Salvar Alterações</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Rifa 100 - Todos os direitos reservados</p>
    </footer>

    <script src="{{ url_for('static', filename='js/admin.js', v='20260312-2') }}"></script>
</body>
</html>
